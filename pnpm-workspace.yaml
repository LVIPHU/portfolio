packages:
  - 'apps/*'
  - 'packages/*'

# pnpm 11: cho phép các package này chạy build/postinstall script
allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  '@tailwindcss/oxide': true
  contentlayer2: true
  esbuild: true
  protobufjs: true
  sharp: true
  unrs-resolver: true

# Không tự re-install trước mỗi lần run script
verifyDepsBeforeRun: false

autoInstallPeers: false
