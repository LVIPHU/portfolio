name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CI chỉ GÁC chất lượng (prettier + typecheck + build + dead-links). Vercel vẫn là
# nơi build & deploy chính. Một job gọi đúng `pnpm ci-check` — không lệch chuẩn với local.
jobs:
  ci-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # web-2025 (t3-env) validate các biến này lúc build + post-build; giá trị placeholder
    # cho CI (DB client lazy, không kết nối thật khi crawl).
    env:
      NODE_ENV: production
      NEXT_PUBLIC_NODE_ENV: production
      NEXT_PUBLIC_APP_URL: http://localhost:3001
      DATABASE_URL: postgres://user:pass@localhost:5432/ci
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack (pnpm)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: ci-check (prettier + typecheck + build + dead-links)
        run: pnpm ci-check
